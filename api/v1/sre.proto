syntax = "proto3";

package sre.v1;

option go_package = "github.com/suryavamsivaggu/sre-platform/api/v1;srev1";

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARNING = 2;
  SEVERITY_ERROR = 3;
  SEVERITY_CRITICAL = 4;
}

enum ServiceStatus {
  STATUS_UNSPECIFIED = 0;
  STATUS_HEALTHY = 1;
  STATUS_DEGRADED = 2;
  STATUS_DOWN = 3;
}

message Process {
  int32 pid = 1;
  string name = 2;
  double cpu_usage = 3;
  double memory_usage = 4;
}

message Metric {
  string service_name = 1;
  string instance_id = 2;
  double cpu_usage = 3;
  double cpu_user = 10;
  double cpu_system = 11;
  double cpu_iowait = 12;
  double memory_usage = 4;
  double total_memory = 7;
  double free_memory = 8;
  double available_memory = 9;
  int64 active_connections = 5;
  int64 timestamp = 6;
  
  // New metrics for user request
  int32 cpu_fan_speed = 13;
  int32 gpu_fan_speed = 14;
  double cpu_power = 15;
  double gpu_power = 16;
  
  // Advanced RAM Metrics
  double mem_cached = 17;
  double mem_buffers = 18;
  double swap_total = 19;
  double swap_used = 20;
  string memory_type = 21;
  // Internet Tracer Metrics
  double tx_bytes = 22;
  double rx_bytes = 23;
  double tx_bits_per_sec = 24;
  double rx_bits_per_sec = 25;
  double latency_ms = 26;
  string hops = 27;
  
  // Processor Deep Metrics
  int64 thread_count = 28;
  int32 running_processes = 29;
  repeated Process top_processes = 30;
  // Hardware Specifics
  string cpu_model = 31;
  int32 cpu_cores = 32;

  // Real-time SRE metrics
  float mttr_seconds = 33;
  float error_budget_percent = 34;
  float uptime_percent = 35;
  float cost_estimate_local = 36;
  float overspend_percent = 37;
  
  // Real-time Automation Jobs
  repeated Job jobs = 38;
  
  // Chaos Analytical Diagnosis
  string chaos_diagnosis = 39;
  
  // Distributed Tracing (Observability Engine)
  string trace_id = 40;
  
  // Release & Deployment Monitoring
  Release release = 41;
  
  // Service Visualization (Dependency Graph)
  repeated Dependency dependencies = 42;
}

message Release {
  string version = 1;
  string status = 2; // CANARY, PRODUCTION, ROLLBACK, FAILED
  int64 deployed_at = 3;
}

message Dependency {
  string target_service = 1;
  string call_type = 2; // GRPC, HTTP, SQL
  double latency_ms = 3;
}

message Job {
  string name = 1;
  string status = 2; // RUNNING, COMPLETED, FAILED
  int32 progress = 3;
  string last_run = 4;
  float duration_seconds = 5;
  double cpu_usage = 6;
  double memory_mb = 7;
  repeated string steps = 8;
}

message Alert {
  string alert_id = 1;
  string service_name = 2;
  Severity severity = 3;
  string message = 4;
  int64 timestamp = 5;
}

message ServiceHealth {
  string service_name = 1;
  ServiceStatus status = 2;
  int64 check_timestamp = 3;
}

message MetricStreamResponse {
  bool success = 1;
  string message = 2;
}

message SubscribeRequest {
  string service_name_filter = 1; // Empty for all services
}

service CollectorService {
  // Agent streams metrics to Collector (Client Streaming)
  rpc StreamMetrics(stream Metric) returns (MetricStreamResponse);
  
  // Real-time server streaming of alerts (Server Streaming)
  rpc SubscribeAlerts(SubscribeRequest) returns (stream Alert);
}
