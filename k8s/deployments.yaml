apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-collector
  labels:
    app: sre-collector
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sre-collector
  template:
    metadata:
      labels:
        app: sre-collector
    spec:
      containers:
      - name: collector
        image: sre-collector:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        ports:
        - containerPort: 50051
        readinessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: sre-collector-svc
spec:
  selector:
    app: sre-collector
  ports:
  - port: 50051
    targetPort: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-gateway
  template:
    metadata:
      labels:
        app: sre-gateway
    spec:
      containers:
      - name: gateway
        image: sre-gateway:latest
        env:
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sre-gateway-svc
spec:
  selector:
    app: sre-gateway
  ports:
  - port: 80
    targetPort: 8080
---
